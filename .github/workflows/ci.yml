name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  non-live-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Public hygiene
        run: node scripts/verify_public_hygiene.js
      - name: Template verifier
        run: node scripts/verify_linebot_project.js assets/template
      - name: Template syntax check
        run: npm run check --prefix assets/template

