name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify template
        run: node scripts/verify_linebot_project.js assets/template
      - name: Syntax check template
        run: npm run check --prefix assets/template
      - name: Secret and local artifact scan
        run: |
          node scripts/verify_public_hygiene.js
